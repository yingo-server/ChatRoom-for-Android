name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5.1

      - name: Generate adaptive icons from ic.png
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi \
                   app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi \
                   app/src/main/res/mipmap-xxxhdpi
          convert ic.png -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert ic.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert ic.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert ic.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert ic.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build with Gradle
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
